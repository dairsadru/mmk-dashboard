<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ММК — Аналитика продаж</title>
  <meta name="description" content="Махачкалинский Мясокомбинат — дашборд аналитики продаж торговой команды"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d090b;--panel:#1a1216;--panel2:#221720;--card:#1e1419;--line:rgba(255,255,255,.07);--text:#f4f0f1;--muted:#b8adb2;--accent:#9e2235;--accent2:#c03a50;--good:#4cc87a;--warn:#e8b84b;--bad:#e86060;--r:16px;--gold:#f0c060}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    .fade{animation:fadeIn .35s ease both}

    /* LOGIN */
    #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
      background:radial-gradient(ellipse at 50% 0%,rgba(158,34,53,.28) 0%,transparent 55%),var(--bg)}
    .login-logo{width:80px;margin-bottom:14px;filter:drop-shadow(0 0 24px rgba(158,34,53,.5))}
    .login-title{font-size:26px;font-weight:900;letter-spacing:-.04em;margin-bottom:4px}
    .login-sub{color:var(--muted);font-size:13px;margin-bottom:4px}
    .login-period{color:rgba(255,255,255,.3);font-size:12px;margin-bottom:32px;background:rgba(255,255,255,.05);padding:4px 12px;border-radius:99px}
    .sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;text-align:left;width:100%;max-width:520px}
    .agents-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:520px}
    .agent-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px 14px;cursor:pointer;
      transition:all .22s;text-align:center;position:relative;overflow:hidden;animation:fadeIn .5s ease both}
    .agent-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transition:transform .22s}
    .agent-card:hover{border-color:var(--accent2);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
    .agent-card:hover::before{transform:scaleX(1)}
    .agent-card:active{transform:scale(.98)}
    .manager-card{grid-column:1/-1;background:linear-gradient(135deg,rgba(158,34,53,.18),rgba(192,58,80,.08));border-color:rgba(158,34,53,.3)}
    .agent-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6b1525);
      display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin:0 auto 10px;border:2px solid rgba(255,255,255,.1)}
    .agent-name{font-size:14px;font-weight:700;margin-bottom:3px}
    .agent-zone{font-size:11px;color:var(--muted);margin-bottom:6px}
    .agent-kpi-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .agent-kpi-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
    .pill-good{background:rgba(76,200,122,.15);color:#80e6aa}
    .pill-bad{background:rgba(232,96,96,.15);color:#ff9e9e}
    .pill-warn{background:rgba(232,184,75,.15);color:#f5d27a}
    .pill-muted{background:rgba(255,255,255,.08);color:var(--muted)}

    /* APP */
    #app{display:none;min-height:100vh;flex-direction:column;max-width:560px;margin:0 auto}
    .header{background:linear-gradient(135deg,rgba(158,34,53,.4),rgba(0,0,0,.1));border-bottom:1px solid var(--line);
      padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
    .header-logo{width:36px;height:36px}
    .header-info{flex:1}
    .header-name{font-size:15px;font-weight:800}
    .header-zone{font-size:11px;color:rgba(255,255,255,.55)}
    .btn-back{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:10px;padding:7px 12px;
      color:var(--text);font-size:13px;cursor:pointer;transition:all .15s}
    .btn-back:hover{background:rgba(255,255,255,.14)}

    /* KPI */
    .kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px 14px 0}
    .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;transition:transform .2s}
    .kpi:hover{transform:translateY(-1px)}
    .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
    .kpi-val{font-size:22px;font-weight:900;line-height:1;animation:countUp .4s ease both}
    .kpi-sub{font-size:11px;margin-top:4px}
    .kpi-up{color:var(--good)}.kpi-dn{color:var(--bad)}.kpi-neu{color:var(--muted)}

    /* Tabs */
    .tabs{display:flex;gap:6px;padding:14px 14px 0;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 14px;
      font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s;color:var(--muted)}
    .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 16px rgba(158,34,53,.4)}
    .tab:hover:not(.active){border-color:rgba(255,255,255,.15);color:var(--text)}

    /* Content */
    .content{padding:14px;flex:1}
    .tab-panel{display:none}
    .tab-panel.active{display:block;animation:fadeIn .3s ease both}

    /* Section titles */
    .sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
      margin:20px 0 10px;display:flex;align-items:center;gap:6px}
    .sec-title:first-child{margin-top:4px}
    .sec-title::after{content:'';flex:1;height:1px;background:var(--line)}

    /* Blocks */
    .alert-block{background:rgba(232,96,96,.08);border:1px solid rgba(232,96,96,.2);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .alert-title{font-size:14px;font-weight:700;color:var(--bad);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .good-block{background:rgba(76,200,122,.07);border:1px solid rgba(76,200,122,.18);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .good-title{font-size:14px;font-weight:700;color:var(--good);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .warn-block{background:rgba(232,184,75,.07);border:1px solid rgba(232,184,75,.2);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .warn-title{font-size:14px;font-weight:700;color:var(--warn);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .info-block{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}

    /* Items */
    .item{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
      margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .15s}
    .item:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
    .item:last-child{margin-bottom:0}
    .item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .item-num{width:26px;height:26px;border-radius:8px;background:var(--panel2);display:flex;align-items:center;
      justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .item-val{font-size:13px;font-weight:700;text-align:right;flex-shrink:0}
    .item-val small{display:block;font-size:10px;color:var(--muted);font-weight:400}

    /* Progress */
    .progress-wrap{margin-bottom:12px}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
    .progress-label span:last-child{font-weight:700}
    .progress-bar{height:7px;background:var(--panel2);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s cubic-bezier(.4,0,.2,1)}
    .progress-fill.good{background:linear-gradient(90deg,#2a9e5a,var(--good))}
    .progress-fill.warn{background:linear-gradient(90deg,#b88520,var(--warn))}
    .progress-fill.bad{background:linear-gradient(90deg,#a03030,var(--bad))}

    /* Badges */
    .badge{display:inline-block;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700}
    .badge-bad{background:rgba(232,96,96,.18);color:#ff9e9e}
    .badge-good{background:rgba(76,200,122,.15);color:#80e6aa}
    .badge-warn{background:rgba(232,184,75,.15);color:#f5d27a}
    .badge-muted{background:rgba(255,255,255,.08);color:var(--muted)}

    /* Money card */
    .money-card{background:linear-gradient(135deg,rgba(158,34,53,.2),rgba(0,0,0,0));border:1px solid rgba(158,34,53,.25);
      border-radius:var(--r);padding:20px;margin-bottom:10px}
    .money-amount{font-size:32px;font-weight:900;letter-spacing:-.03em;animation:countUp .4s ease both}
    .money-label{font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
    .money-row{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px;color:var(--muted)}

    /* Bar chart */
    .chart-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .chart-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
    .bar-chart{display:flex;align-items:flex-end;gap:5px;height:72px}
    .bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
    .bar-col{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--accent2),var(--accent));min-height:3px;transition:height .8s cubic-bezier(.4,0,.2,1);cursor:default}
    .bar-col.cur{background:linear-gradient(180deg,#e05070,var(--accent));box-shadow:0 -4px 16px rgba(192,58,80,.4)}
    .bar-col-val{font-size:9px;color:var(--muted);font-weight:600}
    .bar-lbl{font-size:9px;color:var(--muted)}

    /* Summary cards */
    .sum-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
    .sum-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px}
    .sum-card-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
    .sum-card-val{font-size:20px;font-weight:900}
    .sum-card-sub{font-size:11px;color:var(--muted);margin-top:3px}

    /* Team rank */
    .team-rank{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
    .rank-item{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line);transition:background .15s;cursor:pointer}
    .rank-item:last-child{border-bottom:none}
    .rank-item:hover{background:rgba(255,255,255,.03)}
    .rank-pos{width:24px;font-size:18px;text-align:center;flex-shrink:0}
    .rank-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6b1525);
      display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
    .rank-info{flex:1;min-width:0}
    .rank-name{font-size:13px;font-weight:700}
    .rank-zone{font-size:11px;color:var(--muted)}
    .rank-val{font-size:15px;font-weight:900;flex-shrink:0;text-align:right}
    .rank-val small{display:block;font-size:10px;color:var(--muted);font-weight:400}

    /* Send btn */
    .send-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;
      border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;
      transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(158,34,53,.35)}
    .send-btn:hover{opacity:.88;transform:translateY(-1px)}
    .send-btn:active{transform:scale(.98)}
    .send-btn.done{background:linear-gradient(135deg,#2a9e5a,var(--good))}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1216;
      border:1px solid rgba(76,200,122,.35);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:600;
      color:var(--good);z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.error{color:var(--bad);border-color:rgba(232,96,96,.35)}

    .pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .divider{height:1px;background:var(--line);margin:14px 0}
    .spacer{height:16px}

    @media(min-width:600px){
      body{background:#060405}
      #app{box-shadow:0 0 100px rgba(0,0,0,.7);border-left:1px solid var(--line);border-right:1px solid var(--line)}
      .kpi-row{grid-template-columns:repeat(4,1fr)}
    }
  </style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="login">
  <img src="logo.png" class="login-logo" alt="ММК" onerror="this.style.display='none'"/>
  <div class="login-title">Аналитика продаж</div>
  <div class="login-sub">Махачкалинский Мясокомбинат · Торговая команда</div>
  <div class="login-period" id="loginPeriod"></div>
  <div class="sec-label">Выберите агента</div>
  <div class="agents-grid" id="agentsGrid"></div>
</div>

<!-- ════ APP ════ -->
<div id="app">
  <div class="header">
    <img src="logo.png" class="header-logo" alt="ММК" onerror="this.style.opacity='0'"/>
    <div class="header-info">
      <div class="header-name" id="hdrName"></div>
      <div class="header-zone" id="hdrZone"></div>
    </div>
    <button class="btn-back" onclick="goBack()">← Назад</button>
  </div>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="tabs" id="tabsBar"></div>
  <div class="content">
    <div class="tab-panel active" id="tab-overview"></div>
    <div class="tab-panel" id="tab-points"></div>
    <div class="tab-panel" id="tab-goods"></div>
    <div class="tab-panel" id="tab-money"></div>
    <div class="tab-panel" id="tab-team"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
// ─── HELPERS ───────────────────────────────────────────────────
const fmt = (n) => {
  if (n >= 1000000) return '₽ ' + (n/1000000).toFixed(2).replace('.',',') + ' М';
  if (n >= 1000)    return '₽ ' + Math.round(n/1000) + ' т';
  return '₽ ' + Math.round(n);
};
const pct = (a, b) => b ? ((a - b) / b * 100).toFixed(1) : 0;
const trendCls = v => parseFloat(v) >= 0 ? 'kpi-up' : 'kpi-dn';
const trendSign = v => parseFloat(v) >= 0 ? '+' + v + '%' : v + '%';

// ─── INIT ──────────────────────────────────────────────────────
document.getElementById('loginPeriod').textContent = REPORT_PERIOD;

// Считаем % возвратов для скоринга агента
function agentScore(a) {
  const ret = a.returnsPctCur;
  const vis = a.visitsCur;
  // Чем ниже возвраты и больше визитов — лучше
  let score = 100 - ret * 2;
  if (score < 0) score = 0;
  return Math.round(score);
}

function buildLogin() {
  const grid = document.getElementById('agentsGrid');

  AGENTS.forEach((a, idx) => {
    const score = agentScore(a);
    const sCls  = score >= 75 ? 'pill-good' : score >= 55 ? 'pill-warn' : 'pill-bad';
    const salesDelta = pct(a.salesCur, a.salesPrev / 2.2); // примерно за те же дни
    const el = document.createElement('div');
    el.className = 'agent-card fade';
    el.style.animationDelay = (0.1 * idx + 0.2) + 's';
    el.innerHTML = `
      <div class="agent-avatar">${a.init}</div>
      <div class="agent-name">${a.name.split(' ')[0]}&nbsp;${a.name.split(' ')[1] || ''}</div>
      <div class="agent-zone">${a.zone}</div>
      <div class="agent-kpi-row">
        <span class="agent-kpi-pill ${sCls}">возврат ${a.returnsPctCur}%</span>
        <span class="agent-kpi-pill pill-muted">${a.visitsCur} виз.</span>
      </div>`;
    el.onclick = () => loadAgent(a);
    grid.appendChild(el);
  });

  // Manager card
  const mel = document.createElement('div');
  mel.className = 'agent-card manager-card fade';
  mel.style.animationDelay = '0.6s';
  mel.innerHTML = `
    <div class="agent-avatar">👑</div>
    <div class="agent-name">Сводка по команде</div>
    <div class="agent-zone">Руководительский режим</div>
    <div class="agent-kpi-row">
      <span class="agent-kpi-pill pill-muted">${fmt(TEAM.totalSalesCur)}</span>
      <span class="agent-kpi-pill pill-muted">${TEAM.totalVisitsCur} визитов</span>
    </div>`;
  mel.onclick = loadManager;
  grid.appendChild(mel);
}
buildLogin();

// ─── LOAD AGENT ────────────────────────────────────────────────
function loadAgent(a) {
  window._agent = a;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('hdrName').textContent = a.name;
  document.getElementById('hdrZone').textContent = a.zone + ' · ' + REPORT_PERIOD;

  const salesDelta = pct(a.salesCur, a.salesPrev / 2.2); // нормализация: прошлый месяц полный, текущий ~14 дней из ~30
  const retDelta   = pct(a.returnsPctCur, a.returnsPrev / a.salesPrev * 100);

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Продажи</div>
      <div class="kpi-val">${fmt(a.salesCur)}</div>
      <div class="kpi-sub kpi-neu">1–14 апреля</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Возврат</div>
      <div class="kpi-val">${a.returnsPctCur}%</div>
      <div class="kpi-sub ${a.returnsPctCur < 10 ? 'kpi-up' : 'kpi-dn'}">${fmt(a.returnsCur)} руб.</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Визитов</div>
      <div class="kpi-val">${a.visitsCur}</div>
      <div class="kpi-sub kpi-neu">торговых точек</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">АКБ оборот</div>
      <div class="kpi-val">${fmt(a.akbSumCur)}</div>
      <div class="kpi-sub kpi-neu">активная база</div>
    </div>`;

  document.getElementById('tabsBar').innerHTML = `
    <div class="tab active" id="t-overview" onclick="showTab('overview',this)">🏠 Главное</div>
    <div class="tab" id="t-points"   onclick="showTab('points',this)">📍 Точки</div>
    <div class="tab" id="t-goods"    onclick="showTab('goods',this)">📦 Товары</div>
    <div class="tab" id="t-money"    onclick="showTab('money',this)">💰 Итоги</div>`;

  document.getElementById('tab-team').innerHTML = '';
  renderOverview(a);
  renderPoints(a);
  renderGoods(a);
  renderMoney(a);
  showTab('overview', document.getElementById('t-overview'));
}

// ─── OVERVIEW ──────────────────────────────────────────────────
function renderOverview(a) {
  // Топ-3 точки по выручке
  const sortedPts = [...a.points].sort((x,y) => y.sales - x.sales).slice(0,3);
  const topItems = sortedPts.map(p => `
    <div class="item">
      <div class="item-dot" style="background:var(--good)"></div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-meta">Возврат: ${p.retPct}%</div>
      </div>
      <div class="item-val">${fmt(p.sales)}<small>продажи</small></div>
    </div>`).join('');

  // Проблемные точки (высокий %)
  const badPts = a.points.filter(p => p.retPct > 15);
  const badItems = badPts.length ? badPts.map(p => `
    <div class="item">
      <div class="item-dot" style="background:var(--bad)"></div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-meta">Возврат: <strong style="color:var(--bad)">${p.retPct}%</strong></div>
      </div>
      <div class="item-val" style="color:var(--bad)">${fmt(p.returns)}<small>возврат</small></div>
    </div>`).join('') : '<div style="color:var(--muted);font-size:13px;padding:4px 0">✅ Нет точек с критическим возвратом</div>';

  // Бар-чарт: топ-6 точек
  const top6 = [...a.points].sort((x,y) => y.sales - x.sales).slice(0,6);
  const maxS = Math.max(...top6.map(p => p.sales));
  const bars = top6.map((p, i) => {
    const h = Math.max(6, Math.round((p.sales / maxS) * 65));
    return `<div class="bar-item">
      <div class="bar-col-val">${fmt(p.sales).replace('₽ ','')}</div>
      <div class="bar-col${i===0?' cur':''}" style="height:${h}px" title="${p.name}: ${fmt(p.sales)}"></div>
      <div class="bar-lbl">${p.name.length > 10 ? p.name.substring(0,8)+'…' : p.name}</div>
    </div>`;
  }).join('');

  // Сравнение с прошлым (март / 30 * 14 = ~14 дней марта)
  const marchProportion = a.salesPrev / 30 * 14;
  const vsMarct = pct(a.salesCur, marchProportion);

  document.getElementById('tab-overview').innerHTML = `
    <div class="sum-row">
      <div class="sum-card">
        <div class="sum-card-label">За апрель (14 дн)</div>
        <div class="sum-card-val">${fmt(a.salesCur)}</div>
        <div class="sum-card-sub ${parseFloat(vsMarct)>=0?'kpi-up':'kpi-dn'}">${trendSign(vsMarct.toString())} vs март (14 дн)</div>
      </div>
      <div class="sum-card">
        <div class="sum-card-label">Март 2026 (итог)</div>
        <div class="sum-card-val">${fmt(a.salesPrev)}</div>
        <div class="sum-card-sub kpi-neu">прошлый месяц</div>
      </div>
    </div>
    <div class="chart-wrap">
      <div class="chart-label">📊 Продажи по точкам (топ-6)</div>
      <div class="bar-chart">${bars}</div>
    </div>
    <div class="sec-title">🏆 Лучшие точки</div>
    ${topItems}
    ${badPts.length ? `<div class="sec-title">⚠️ Высокий возврат</div><div class="alert-block">${badItems}</div>` : ''}
    <div class="spacer"></div>
    <button class="send-btn" id="sendBtn" onclick="sendReport('${a.id}')">📤 Отправить отчёт руководителю</button>`;
}

// ─── POINTS ────────────────────────────────────────────────────
function renderPoints(a) {
  const sorted = [...a.points].sort((x,y) => y.sales - x.sales);
  const items = sorted.map((p, i) => {
    const retCls = p.retPct > 15 ? 'var(--bad)' : p.retPct > 8 ? 'var(--warn)' : 'var(--good)';
    const badgeCls = p.retPct > 15 ? 'badge-bad' : p.retPct > 8 ? 'badge-warn' : 'badge-good';
    const badgeTxt = p.retPct > 15 ? '⚠️ Высокий' : p.retPct > 8 ? '⚠️ Средний' : '✅ Норма';
    return `<div class="item">
      <div class="item-num">${i+1}</div>
      <div class="item-dot" style="background:${retCls}"></div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-meta">Продажи: ${fmt(p.sales)} · Возврат: ${p.retPct}%</div>
      </div>
      <div class="item-val">${fmt(p.returns)}<small><span class="badge ${badgeCls}">${badgeTxt}</span></small></div>
    </div>`;
  }).join('');

  const highRet = sorted.filter(p => p.retPct > 15).length;
  const midRet  = sorted.filter(p => p.retPct > 8 && p.retPct <= 15).length;
  const ok      = sorted.filter(p => p.retPct <= 8).length;

  document.getElementById('tab-points').innerHTML = `
    <div class="sec-title">Торговые точки (${a.points.length})</div>
    <div class="pills">
      <span class="badge badge-bad">⚠️ Высокий возврат: ${highRet}</span>
      <span class="badge badge-warn">Средний: ${midRet}</span>
      <span class="badge badge-good">✅ Норма: ${ok}</span>
    </div>
    ${items}`;
  animateProgressBars();
}

// ─── GOODS ─────────────────────────────────────────────────────
function renderGoods(a) {
  const sortedGood = [...a.topGoods].sort((x,y) => y.sales - x.sales);
  const goodItems = sortedGood.map(g => `
    <div class="item">
      <div class="item-dot" style="background:var(--good)"></div>
      <div class="item-info">
        <div class="item-name">${g.name}</div>
        <div class="item-meta">${g.cat}</div>
      </div>
      <div class="item-val">${fmt(g.sales)}<small>↑ продвигать</small></div>
    </div>`).join('');

  const badItems = a.badGoods.map(g => `
    <div class="item">
      <div class="item-dot" style="background:var(--bad)"></div>
      <div class="item-info">
        <div class="item-name">${g.name}</div>
        <div class="item-meta">${g.cat} · Возврат: <strong style="color:var(--bad)">${g.retPct}%</strong></div>
      </div>
      <div class="item-val" style="color:var(--bad);font-size:11px;max-width:90px;text-align:right">${g.action}</div>
    </div>`).join('');

  document.getElementById('tab-goods').innerHTML = `
    <div class="good-block">
      <div class="good-title">✅ Хорошо продаётся — продвигать</div>
      ${goodItems}
    </div>
    <div class="sec-title">Проблемные товары</div>
    <div class="alert-block">
      <div class="alert-title">❌ Высокий возврат — принять меры</div>
      ${badItems}
    </div>`;
}

// ─── MONEY ─────────────────────────────────────────────────────
function renderMoney(a) {
  const netSales = a.salesCur - a.returnsCur;
  const grossRetPct = (a.returnsCur / (a.salesCur + a.returnsCur) * 100).toFixed(2);
  const marchProportion = a.salesPrev / 30 * 14;
  const delta = pct(a.salesCur, marchProportion);

  document.getElementById('tab-money').innerHTML = `
    <div class="money-card">
      <div class="money-label">Продажи апрель 2026 (1–14)</div>
      <div class="money-amount">${fmt(a.salesCur)}</div>
      <div class="money-row">
        <span>Возвраты: <strong style="color:var(--bad)">${fmt(a.returnsCur)}</strong></span>
        <span>·</span>
        <span>Чистые: <strong style="color:var(--good)">${fmt(netSales)}</strong></span>
      </div>
    </div>
    <div class="sum-row">
      <div class="sum-card">
        <div class="sum-card-label">% возврата</div>
        <div class="sum-card-val" style="color:${a.returnsPctCur>15?'var(--bad)':a.returnsPctCur>8?'var(--warn)':'var(--good)'}">${a.returnsPctCur}%</div>
        <div class="sum-card-sub kpi-neu">по количеству</div>
      </div>
      <div class="sum-card">
        <div class="sum-card-label">vs Март (14 дней)</div>
        <div class="sum-card-val ${trendCls(delta)}">${trendSign(delta.toString())}</div>
        <div class="sum-card-sub kpi-neu">${fmt(a.salesPrev)} — март итог</div>
      </div>
    </div>
    <div class="sec-title">Прошлый месяц (Март 2026)</div>
    <div class="info-block">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="color:var(--muted);font-size:12px">Продажи март</span>
        <strong>${fmt(a.salesPrev)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="color:var(--muted);font-size:12px">Возвраты март</span>
        <strong style="color:var(--bad)">${fmt(a.returnsPrev)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--muted);font-size:12px">Чистые март</span>
        <strong style="color:var(--good)">${fmt(a.salesPrev - a.returnsPrev)}</strong>
      </div>
    </div>
    <div class="sec-title">По точкам — возвраты текущего месяца</div>
    ${[...a.points].filter(p=>p.returns>0).sort((x,y)=>y.returns-x.returns).map(p=>`
    <div class="item">
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-meta">Продажи: ${fmt(p.sales)}</div>
      </div>
      <div class="item-val" style="color:${p.retPct>15?'var(--bad)':p.retPct>8?'var(--warn)':'var(--good)'}">
        ${fmt(p.returns)}<small>${p.retPct}% возврат</small>
      </div>
    </div>`).join('') || '<div style="color:var(--muted);font-size:13px;padding:6px 0">✅ Возвратов по точкам нет</div>'}`;
}

// ─── MANAGER ───────────────────────────────────────────────────
function loadManager() {
  window._agent = null;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('hdrName').textContent = '👑 Сводка по команде';
  document.getElementById('hdrZone').textContent = REPORT_PERIOD + ' · ' + PREV_PERIOD;

  const totalNet = TEAM.totalSalesCur - TEAM.totalReturnsCur;
  const retPctTeam = (TEAM.totalReturnsCur / TEAM.totalSalesCur * 100).toFixed(1);

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Продажи команды</div>
      <div class="kpi-val">${fmt(TEAM.totalSalesCur)}</div>
      <div class="kpi-sub kpi-neu">апрель 1–14</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Возвраты</div>
      <div class="kpi-val">${retPctTeam}%</div>
      <div class="kpi-sub kpi-dn">${fmt(TEAM.totalReturnsCur)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Визиты итого</div>
      <div class="kpi-val">${TEAM.totalVisitsCur}</div>
      <div class="kpi-sub kpi-neu">все агенты</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Чистые продажи</div>
      <div class="kpi-val">${fmt(totalNet)}</div>
      <div class="kpi-sub kpi-up">без возвратов</div>
    </div>`;

  document.getElementById('tabsBar').innerHTML = `
    <div class="tab active" id="t-team"     onclick="showTab('team',this)">📋 Рейтинг</div>
    <div class="tab" id="t-overview"        onclick="showTab('overview',this)">📊 Продажи</div>
    <div class="tab" id="t-money"           onclick="showTab('money',this)">💰 Итоги</div>`;

  renderTeamRank();
  renderManagerSales();
  renderManagerMoney();
  showTab('team', document.getElementById('t-team'));
}

function renderTeamRank() {
  const sorted = [...AGENTS].sort((a,b) => b.salesCur - a.salesCur);
  const medals = ['🥇','🥈','🥉'];

  const items = sorted.map((a,i) => {
    const retCls = a.returnsPctCur < 10 ? 'badge-good' : a.returnsPctCur < 15 ? 'badge-warn' : 'badge-bad';
    return `<div class="rank-item" onclick="loadAgent(AGENTS.find(x=>x.id==='${a.id}'))">
      <div class="rank-pos">${medals[i] || (i+1)}</div>
      <div class="rank-av">${a.init}</div>
      <div class="rank-info">
        <div class="rank-name">${a.name}</div>
        <div class="rank-zone">${a.zone}</div>
      </div>
      <div class="rank-val">${fmt(a.salesCur)}<small>возврат: <span class="badge ${retCls}">${a.returnsPctCur}%</span></small></div>
    </div>`;
  }).join('');

  // Прогрессы по возвратам (чем ниже — тем лучше)
  const retRows = [...AGENTS].sort((a,b) => a.returnsPctCur - b.returnsPctCur).map(a => {
    const cls = a.returnsPctCur < 10 ? 'good' : a.returnsPctCur < 15 ? 'warn' : 'bad';
    return `<div class="progress-wrap">
      <div class="progress-label"><span>${a.short}</span><span>${a.returnsPctCur}%</span></div>
      <div class="progress-bar"><div class="progress-fill ${cls}" style="width:0%" data-target="${Math.min(a.returnsPctCur*3,100)}"></div></div>
    </div>`;
  }).join('');

  document.getElementById('tab-team').innerHTML = `
    <div class="sec-title">Рейтинг по продажам</div>
    <div class="team-rank">${items}</div>
    <div class="sec-title">% возврата по агентам</div>
    <div class="info-block">${retRows}</div>`;
  animateProgressBars();
}

function renderManagerSales() {
  const sorted = [...AGENTS].sort((a,b) => b.salesCur - a.salesCur);
  const maxSales = sorted[0].salesCur;

  const rows = sorted.map(a => {
    const width = Math.round(a.salesCur / maxSales * 100);
    const cls = a.returnsPctCur < 10 ? 'good' : a.returnsPctCur < 15 ? 'warn' : 'bad';
    return `<div class="progress-wrap">
      <div class="progress-label"><span>${a.short} · ${fmt(a.salesCur)}</span><span class="${a.returnsPctCur<10?'kpi-up':'kpi-dn'}">возврат ${a.returnsPctCur}%</span></div>
      <div class="progress-bar"><div class="progress-fill ${cls}" style="width:0%" data-target="${width}"></div></div>
    </div>`;
  }).join('');

  // Всего
  const totalVisAll = AGENTS.reduce((s,a) => s+a.visitsCur, 0);

  document.getElementById('tab-overview').innerHTML = `
    <div class="sum-row">
      <div class="sum-card">
        <div class="sum-card-label">Продажи итого</div>
        <div class="sum-card-val">${fmt(TEAM.totalSalesCur)}</div>
        <div class="sum-card-sub kpi-neu">апрель 1–14</div>
      </div>
      <div class="sum-card">
        <div class="sum-card-label">Возвраты итого</div>
        <div class="sum-card-val" style="color:var(--bad)">${fmt(TEAM.totalReturnsCur)}</div>
        <div class="sum-card-sub kpi-dn">${(TEAM.totalReturnsCur/TEAM.totalSalesCur*100).toFixed(1)}%</div>
      </div>
    </div>
    <div class="sec-title">Продажи по агентам</div>
    <div class="info-block">${rows}</div>
    <div class="sec-title">Визиты по агентам</div>
    <div class="team-rank">
      ${AGENTS.map(a=>`<div class="rank-item">
        <div class="rank-av">${a.init}</div>
        <div class="rank-info"><div class="rank-name">${a.short}</div><div class="rank-zone">${a.zone}</div></div>
        <div class="rank-val">${a.visitsCur}<small>визитов</small></div>
      </div>`).join('')}
    </div>`;
  animateProgressBars();
}

function renderManagerMoney() {
  const rows = [...AGENTS].sort((a,b) => b.salesCur - a.salesCur).map(a => {
    const net = a.salesCur - a.returnsCur;
    const retCls = a.returnsPctCur < 10 ? 'kpi-up' : 'kpi-dn';
    return `<div class="item">
      <div class="item-dot" style="background:${a.returnsPctCur<10?'var(--good)':a.returnsPctCur<15?'var(--warn)':'var(--bad)'}"></div>
      <div class="item-info">
        <div class="item-name">${a.name}</div>
        <div class="item-meta">Продажи: ${fmt(a.salesCur)} · Возвраты: ${fmt(a.returnsCur)}</div>
      </div>
      <div class="item-val">${fmt(net)}<small>чистые</small></div>
    </div>`;
  }).join('');

  document.getElementById('tab-money').innerHTML = `
    <div class="money-card">
      <div class="money-label">Итого по команде (апрель 1–14)</div>
      <div class="money-amount">${fmt(TEAM.totalSalesCur)}</div>
      <div class="money-row">
        <span>Возвраты: <strong style="color:var(--bad)">${fmt(TEAM.totalReturnsCur)}</strong></span>
        <span>·</span>
        <span>Чистые: <strong style="color:var(--good)">${fmt(TEAM.totalSalesCur - TEAM.totalReturnsCur)}</strong></span>
      </div>
    </div>
    <div class="sec-title">По агентам — чистые продажи</div>
    ${rows}
    <div class="sec-title">Март 2026 (прошлый месяц — итог)</div>
    <div class="team-rank">
      ${AGENTS.map(a=>`<div class="rank-item">
        <div class="rank-av">${a.init}</div>
        <div class="rank-info"><div class="rank-name">${a.short}</div><div class="rank-zone">март: ${fmt(a.salesPrev)}</div></div>
        <div class="rank-val">${fmt(a.salesPrev - a.returnsPrev)}<small>чистые</small></div>
      </div>`).join('')}
    </div>`;
}

// ─── UTILS ─────────────────────────────────────────────────────
function animateProgressBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.progress-fill[data-target]').forEach(el => {
      const t = el.dataset.target;
      setTimeout(() => { el.style.width = t + '%'; }, 80);
    });
  });
}

function showTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  animateProgressBars();
}

function goBack() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  window._agent = null;
}

function sendReport(agentId) {
  const btn = document.getElementById('sendBtn');
  if (!btn) return;
  btn.style.opacity = '.6';
  btn.style.pointerEvents = 'none';
  btn.textContent = '⏳ Отправка...';
  setTimeout(() => {
    btn.className = 'send-btn done';
    btn.innerHTML = '✅ Отчёт отправлен';
    showToast('✅ Отчёт отправлен руководителю');
    setTimeout(() => {
      btn.className = 'send-btn';
      btn.innerHTML = '📤 Отправить отчёт руководителю';
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
    }, 4000);
  }, 1200);
}

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err?' error':'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
